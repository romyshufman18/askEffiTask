<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Activity Logs – AskEffi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      padding: 28px 3vw;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    h1 { font-size: 1.1rem; font-weight: 600; color: #e8eaf0; margin-bottom: 16px; letter-spacing: -0.01em; }
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    select, input {
      padding: 6px 10px;
      border: 1px solid #2a2d3a;
      border-radius: 7px;
      font-size: 0.82rem;
      font-family: inherit;
      background: #1a1d27;
      color: #e8eaf0;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input:focus { border-color: #10a37f; }
    button {
      padding: 6px 14px;
      background: #10a37f;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #0d8f6f; }
    #count { font-size: 0.8rem; color: #6b7280; margin-left: auto; }
    table { width: 100%; border-collapse: collapse; background: #1a1d27; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.4); font-size: 0.83rem; border: 1px solid #2a2d3a; }
    thead { background: #161820; }
    th { padding: 10px 14px; text-align: left; font-weight: 600; color: #6b7280; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #2a2d3a; }
    td { padding: 9px 14px; border-bottom: 1px solid #22263a; color: #c9cbd3; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(16,163,127,0.05); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
    .badge.chat { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge.folder_select { background: rgba(16,163,127,0.15); color: #34d399; }
    .badge.folder_refresh { background: rgba(14,165,233,0.15); color: #38bdf8; }
    .badge.onedrive_connect { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .badge.onedrive_disconnect { background: rgba(239,68,68,0.12); color: #f87171; }
    .badge.error { background: rgba(239,68,68,0.12); color: #f87171; }
    .details { color: #6b7280; font-size: 0.78rem; white-space: pre-wrap; word-break: break-all; max-width: 400px; }
    #empty { text-align: center; padding: 48px; color: #4b5563; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Activity Logs</h1>
  <div class="toolbar">
    <select id="filter-event">
      <option value="">All events</option>
      <option value="chat">chat</option>
      <option value="folder_select">folder_select</option>
      <option value="folder_refresh">folder_refresh</option>
      <option value="onedrive_connect">onedrive_connect</option>
      <option value="onedrive_disconnect">onedrive_disconnect</option>
      <option value="error">error</option>
    </select>
    <input type="text" id="filter-session" placeholder="Filter by session ID…" style="width:220px" />
    <button onclick="loadLogs()">Refresh</button>
    <span id="count"></span>
  </div>
  <div id="table-wrap"></div>

  <script>
    let allLogs = [];

    function formatDetails(details) {
      if (!details || !Object.keys(details).length) return '—';
      return Object.entries(details).map(([k, v]) => `${k}: ${v ?? '—'}`).join('\n');
    }

    function render() {
      const eventFilter = document.getElementById('filter-event').value;
      const sessionFilter = document.getElementById('filter-session').value.trim().toLowerCase();

      const filtered = allLogs.filter(log => {
        if (eventFilter && log.event !== eventFilter) return false;
        if (sessionFilter && !(log.session || '').toLowerCase().includes(sessionFilter)) return false;
        return true;
      });

      document.getElementById('count').textContent = `${filtered.length} entries`;

      if (!filtered.length) {
        document.getElementById('table-wrap').innerHTML = '<div id="empty">No log entries found.</div>';
        return;
      }

      const rows = filtered.map(log => `
        <tr>
          <td>${new Date(log.timestamp).toLocaleString()}</td>
          <td><span class="badge ${log.event}">${log.event}</span></td>
          <td style="font-family:monospace;font-size:0.78rem">${log.session}</td>
          <td><div class="details">${formatDetails(log.details)}</div></td>
        </tr>
      `).join('');

      document.getElementById('table-wrap').innerHTML = `
        <table>
          <thead><tr><th>Timestamp</th><th>Event</th><th>Session</th><th>Details</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadLogs() {
      document.getElementById('count').textContent = 'Loading…';
      const res = await fetch('/api/admin/logs');
      allLogs = await res.json();
      render();
    }

    document.getElementById('filter-event').addEventListener('change', render);
    document.getElementById('filter-session').addEventListener('input', render);

    loadLogs();
  </script>
</body>
</html>
