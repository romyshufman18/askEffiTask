<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskEffi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #10a37f;
      --accent-dark: #0d8f6f;
      --accent-muted: rgba(16, 163, 127, 0.15);
      --bg: #0f1117;
      --surface: #1a1d27;
      --sidebar-bg: #161820;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
      --radius: 14px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .app-wrapper {
      display: flex;
      height: 96vh;
      width: 96vw;
      max-width: 1200px;
      gap: 14px;
    }

    .chat-container { flex: 1; }

    /* ── Folder Sidebar ── */
    #folder-sidebar {
      width: 230px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      display: none;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #folder-sidebar.visible { display: flex; }

    .sidebar-header {
      padding: 12px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    #scope-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      font-weight: 500;
      font-size: 0.82rem;
      text-transform: none;
      letter-spacing: 0;
    }

    #scope-refresh, #scope-reset {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 2px 5px;
      flex-shrink: 0;
      display: none;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }

    #scope-refresh:hover { background: var(--accent-muted); color: var(--accent); }
    #scope-refresh:disabled { opacity: 0.35; cursor: not-allowed; }
    #scope-reset:hover { background: #fee2e2; color: #dc2626; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block !important; animation: spin 0.7s linear infinite; }

    #folder-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #folder-tree::-webkit-scrollbar { width: 4px; }
    #folder-tree::-webkit-scrollbar-track { background: transparent; }
    #folder-tree::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    .tree-node { user-select: none; }

    .tree-row {
      display: flex;
      align-items: center;
      padding: 5px 10px;
      cursor: default;
      border-radius: 7px;
      margin: 1px 6px;
      transition: background 0.12s;
    }

    .tree-row:hover { background: var(--accent-muted); }

    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.58rem;
      color: #9ca3af;
      width: 16px;
      padding: 0;
      flex-shrink: 0;
      transition: color 0.12s;
    }

    .toggle-btn:hover { color: var(--text); }

    .folder-icon {
      font-size: 0.82rem;
      margin: 0 5px 0 2px;
      flex-shrink: 0;
    }

    .folder-name {
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.12s;
    }

    .folder-name:hover { color: var(--accent); }
    .folder-name.selected { color: var(--accent); font-weight: 600; }

    .tree-children { display: none; padding-left: 16px; }
    .tree-children.expanded { display: block; }

    .tree-loading {
      font-size: 0.76rem;
      color: #9ca3af;
      padding: 4px 12px;
      font-style: italic;
    }

    .tree-empty {
      font-size: 0.76rem;
      color: #c4c9d4;
      padding: 4px 12px;
    }

    /* ── Chat Container ── */
    .chat-container {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    header {
      padding: 15px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    #onedrive-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 20px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    #onedrive-status {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
    }

    #status-dot.connected { background: var(--accent); box-shadow: 0 0 0 2px rgba(16,163,127,0.2); }

    #connect-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    #connect-btn:hover { border-color: var(--accent); background: var(--accent-muted); color: var(--accent); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .avatar.ai {
      background: var(--accent);
      color: #fff;
    }

    .avatar.user-av {
      background: #2a2d3a;
      color: var(--text-muted);
    }

    .message {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow-sm);
    }

    .message.user {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #22263a;
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message.typing {
      color: #9ca3af;
      font-style: italic;
    }

    .input-area {
      display: flex;
      align-items: flex-end;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      gap: 10px;
      background: var(--surface);
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      max-height: 120px;
      line-height: 1.55;
      color: var(--text);
      background: #0f1117;
      transition: border-color 0.15s, background 0.15s;
    }

    #user-input:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    #user-input::placeholder { color: #9ca3af; }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #send-btn:hover { background: var(--accent-dark); transform: scale(1.04); }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { background: #a7f3d0; cursor: not-allowed; transform: none; }

    #send-btn svg { pointer-events: none; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div id="folder-sidebar">
      <div class="sidebar-header">
        <span id="scope-label">📁 Documents</span>
        <button id="scope-refresh" onclick="refreshFolder()" title="Refresh folder">🔄</button>
        <button id="scope-reset" onclick="resetToRoot()" title="Reset to Documents">✕</button>
      </div>
      <div id="folder-tree"></div>
    </div>

    <div class="chat-container">
      <header>
        <div class="header-logo">✦</div>
        <div>
          <div class="header-title">AskEffi</div>
          <div class="header-sub">Your OneDrive AI assistant</div>
        </div>
      </header>
      <div id="onedrive-bar">
        <div id="onedrive-status">
          <span id="status-dot"></span>
          <span id="status-text">OneDrive: not connected</span>
        </div>
        <button id="connect-btn" onclick="window.location='/auth/onedrive'">Connect OneDrive</button>
      </div>
      <div id="messages">
      </div>
      <div class="input-area">
        <textarea id="user-input" rows="1" placeholder="Ask about your files…"></textarea>
        <button id="send-btn" title="Send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const history = [];

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, text) {
      const row = document.createElement('div');
      const isUser = role === 'user';
      const isTyping = role.includes('typing');
      const baseRole = isTyping ? 'assistant' : role;

      row.className = `message-row ${isUser ? 'user' : ''}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${isUser ? 'user-av' : 'ai'}`;
      avatar.textContent = isUser ? '👤' : '✦';

      const bubble = document.createElement('div');
      bubble.className = `message ${baseRole}${isTyping ? ' typing' : ''}`;
      bubble.textContent = text;

      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
      return bubble;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      history.push({ role: 'user', content: text });

      const typingEl = addMessage('assistant typing', 'Thinking…');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        const data = await res.json();

        if (data.error) {
          typingEl.textContent = `Error: ${data.error}`;
          typingEl.classList.remove('typing');
        } else {
          const reply = data.message.content;
          typingEl.textContent = reply;
          typingEl.classList.remove('typing');
          history.push({ role: 'assistant', content: reply });
        }
      } catch (err) {
        typingEl.textContent = 'Network error. Please try again.';
        typingEl.classList.remove('typing');
      }

      sendBtn.disabled = false;
      scrollToBottom();
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // ── Folder Tree ──────────────────────────────────────────────

    let selectedFolderId = null;
    let selectedFolderName = null;

    function updateScopeIndicator(folderName) {
      document.getElementById('scope-label').textContent = `📁 ${folderName || 'Documents'}`;
      const showButtons = folderName ? 'inline' : 'none';
      document.getElementById('scope-refresh').style.display = showButtons;
      document.getElementById('scope-reset').style.display = showButtons;
    }

    async function refreshFolder() {
      const btn = document.getElementById('scope-refresh');
      btn.disabled = true;
      btn.classList.add('spinning');
      const displayName = selectedFolderName || 'Documents';
      document.getElementById('status-text').textContent = `OneDrive: ${displayName} (refreshing…)`;
      try {
        const res = await fetch('/api/onedrive/focus', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ folderId: selectedFolderId, folderName: selectedFolderName }),
        });
        const { fileCount } = await res.json();
        const countStr = fileCount != null ? ` (${fileCount} files)` : '';
        document.getElementById('status-text').textContent = `OneDrive: ${displayName}${countStr}`;
      } catch {
        document.getElementById('status-text').textContent = `OneDrive: ${displayName} (refresh failed)`;
      }
      btn.classList.remove('spinning');
      btn.disabled = false;
    }

    async function resetToRoot() {
      selectedFolderId = null;
      selectedFolderName = null;
      document.querySelectorAll('.folder-name').forEach(el => el.classList.remove('selected'));
      const rootLabel = document.querySelector('.folder-name[data-id="root"]');
      if (rootLabel) rootLabel.classList.add('selected');
      updateScopeIndicator(null);
      document.getElementById('status-text').textContent = 'OneDrive: Documents (loading…)';
      const res = await fetch('/api/onedrive/focus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folderId: null, folderName: null }),
      });
      const { fileCount } = await res.json();
      const countStr = fileCount != null ? ` (${fileCount} files)` : '';
      document.getElementById('status-text').textContent = `OneDrive: Documents${countStr}`;
    }

    function createTreeNode(id, name, childCount) {
      const node = document.createElement('div');
      node.className = 'tree-node';

      const row = document.createElement('div');
      row.className = 'tree-row';

      const toggle = document.createElement('button');
      toggle.className = 'toggle-btn';

      const icon = document.createElement('span');
      icon.className = 'folder-icon';
      icon.textContent = '📁';

      const label = document.createElement('span');
      label.className = 'folder-name';
      label.textContent = name;
      label.dataset.id = id || 'root';
      if ((id || null) === selectedFolderId) label.classList.add('selected');

      const children = document.createElement('div');
      children.className = 'tree-children';

      if (childCount === 0) {
        toggle.style.visibility = 'hidden';
      } else {
        toggle.textContent = '▶';
        let loaded = false;
        toggle.addEventListener('click', async () => {
          const isExpanded = children.classList.toggle('expanded');
          toggle.textContent = isExpanded ? '▼' : '▶';
          if (isExpanded && !loaded) {
            loaded = true;
            children.innerHTML = '<div class="tree-loading">Loading...</div>';
            await loadChildren(id, children);
          }
        });
      }

      label.addEventListener('click', () => focusFolder(id, name, label));

      row.appendChild(toggle);
      row.appendChild(icon);
      row.appendChild(label);
      node.appendChild(row);
      node.appendChild(children);
      return node;
    }

    async function loadChildren(parentId, container) {
      try {
        const url = parentId ? `/api/onedrive/folders?itemId=${parentId}` : '/api/onedrive/folders';
        const res = await fetch(url);
        const folders = await res.json();
        container.innerHTML = '';
        if (!folders.length) {
          container.innerHTML = '<div class="tree-empty">No subfolders</div>';
          return;
        }
        folders.forEach(f => container.appendChild(createTreeNode(f.id, f.name, f.childCount)));
      } catch {
        container.innerHTML = '<div class="tree-empty">Error loading folders</div>';
      }
    }

    async function focusFolder(folderId, folderName, labelEl) {
      document.querySelectorAll('.folder-name').forEach(el => el.classList.remove('selected'));
      labelEl.classList.add('selected');
      selectedFolderId = folderId || null;
      selectedFolderName = folderId ? folderName : null;

      const displayName = folderId ? folderName : 'Documents';
      document.getElementById('status-text').textContent = `OneDrive: ${displayName} (loading…)`;

      const res = await fetch('/api/onedrive/focus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folderId: folderId || null, folderName: folderId ? folderName : null }),
      });
      const { fileCount, fileSummary } = await res.json();

      const countStr = fileCount != null ? ` (${fileCount} files)` : '';
      document.getElementById('status-text').textContent = `OneDrive: ${displayName}${countStr}`;
      updateScopeIndicator(folderId ? folderName : null);

      if (folderId) {
        try {
          const briefRes = await fetch('/api/chat/folder-brief', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              folderName: displayName,
              fileCount: fileCount ?? 0,
              fileSummary: fileSummary || '',
            }),
          });
          const briefData = await briefRes.json();
          if (briefData.message) {
            addMessage('assistant', briefData.message);
          }
        } catch { /* silently ignore */ }
      }
    }

    function initFolderTree(folderName, folderId) {
      selectedFolderId = folderId || null;
      const tree = document.getElementById('folder-tree');
      tree.innerHTML = '';
      const rootNode = createTreeNode(null, 'Documents', null);
      tree.appendChild(rootNode);
    }

    // ── OneDrive Status ──────────────────────────────────────────

    async function checkOnedriveStatus() {
      try {
        const res = await fetch('/api/onedrive/status');
        const { connected, folderId, folderName } = await res.json();
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const btn = document.getElementById('connect-btn');
        if (connected) {
          dot.classList.add('connected');
          text.textContent = `OneDrive: ${folderName || 'Documents'}`;
          btn.textContent = 'Reconnect';
          document.getElementById('folder-sidebar').classList.add('visible');
          initFolderTree(folderName, folderId);
          selectedFolderName = folderName || null;
          updateScopeIndicator(folderName);
        }
      } catch (e) { /* silently ignore */ }
    }

    // Show auth error if redirected back with error
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'auth_failed') {
      addMessage('assistant', 'OneDrive connection failed. Please try again.');
      window.history.replaceState({}, '', '/');
    }

    checkOnedriveStatus();

    // Load welcome message
    (async () => {
      try {
        const res = await fetch('/api/chat/welcome');
        const data = await res.json();
        if (data.message) addMessage('assistant', data.message);
      } catch { /* silently ignore */ }
    })();
  </script>
</body>
</html>
