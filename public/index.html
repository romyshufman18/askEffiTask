<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskEffi Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-wrapper {
      display: flex;
      height: 90vh;
      gap: 12px;
    }

    /* ── Folder Sidebar ── */
    #folder-sidebar {
      width: 220px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #folder-sidebar.visible { display: flex; }

    .sidebar-header {
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #333;
      border-bottom: 1px solid #e5e5e5;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    #scope-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #scope-refresh, #scope-reset {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.75rem;
      color: #0078d4;
      padding: 0;
      flex-shrink: 0;
      display: none;
    }

    #scope-refresh:hover { color: #005fa3; }
    #scope-refresh:disabled { opacity: 0.4; cursor: not-allowed; }
    #scope-reset:hover { color: #c00; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block !important; animation: spin 0.7s linear infinite; }

    #folder-tree {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .tree-node { user-select: none; }

    .tree-row {
      display: flex;
      align-items: center;
      padding: 5px 10px;
      cursor: default;
      border-radius: 6px;
      margin: 1px 6px;
    }

    .tree-row:hover { background: #f0f5ff; }

    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.65rem;
      color: #999;
      width: 16px;
      padding: 0;
      flex-shrink: 0;
    }

    .toggle-btn:hover { color: #333; }

    .folder-icon {
      font-size: 0.85rem;
      margin: 0 4px;
      flex-shrink: 0;
    }

    .folder-name {
      cursor: pointer;
      font-size: 0.83rem;
      color: #333;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .folder-name:hover { color: #0078d4; }
    .folder-name.selected { color: #0078d4; font-weight: 600; }

    .tree-children { display: none; padding-left: 16px; }
    .tree-children.expanded { display: block; }

    .tree-loading {
      font-size: 0.78rem;
      color: #aaa;
      padding: 4px 10px;
      font-style: italic;
    }

    .tree-empty {
      font-size: 0.78rem;
      color: #bbb;
      padding: 4px 10px;
    }

    /* ── Chat Container ── */
    .chat-container {
      width: 720px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px;
      background: #10a37f;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    #onedrive-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 24px;
      background: #f8f9fa;
      border-bottom: 1px solid #e5e5e5;
      font-size: 0.85rem;
      color: #555;
    }

    #onedrive-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }

    #status-dot.connected { background: #10a37f; }

    #connect-btn {
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #connect-btn:hover { background: #005fa3; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #10a37f;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.typing {
      color: #888;
      font-style: italic;
    }

    .input-area {
      display: flex;
      padding: 12px 16px;
      border-top: 1px solid #e5e5e5;
      gap: 10px;
      background: #fff;
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #user-input:focus { border-color: #10a37f; }

    #send-btn {
      background: #10a37f;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
      height: 42px;
    }

    #send-btn:hover { background: #0d8f6f; }
    #send-btn:disabled { background: #a0d4c4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div id="folder-sidebar">
      <div class="sidebar-header">
        <span id="scope-label">📁 Documents</span>
        <button id="scope-refresh" onclick="refreshFolder()" title="Refresh folder">🔄</button>
        <button id="scope-reset" onclick="resetToRoot()" title="Reset to Documents">✕</button>
      </div>
      <div id="folder-tree"></div>
    </div>

    <div class="chat-container">
      <header>AskEffi – ChatGPT Assistant</header>
      <div id="onedrive-bar">
        <div id="onedrive-status">
          <span id="status-dot"></span>
          <span id="status-text">OneDrive: not connected</span>
        </div>
        <button id="connect-btn" onclick="window.location='/auth/onedrive'">Connect OneDrive</button>
      </div>
      <div id="messages">
      </div>
      <div class="input-area">
        <textarea id="user-input" rows="1" placeholder="Type a message..."></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const history = [];

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      history.push({ role: 'user', content: text });

      const typingEl = addMessage('assistant typing', 'Thinking...');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        const data = await res.json();

        if (data.error) {
          typingEl.textContent = `Error: ${data.error}`;
          typingEl.classList.remove('typing');
        } else {
          const reply = data.message.content;
          typingEl.textContent = reply;
          typingEl.classList.remove('typing');
          history.push({ role: 'assistant', content: reply });
        }
      } catch (err) {
        typingEl.textContent = 'Network error. Please try again.';
        typingEl.classList.remove('typing');
      }

      sendBtn.disabled = false;
      scrollToBottom();
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // ── Folder Tree ──────────────────────────────────────────────

    let selectedFolderId = null;
    let selectedFolderName = null;

    function updateScopeIndicator(folderName) {
      document.getElementById('scope-label').textContent = `📁 ${folderName || 'Documents'}`;
      const showButtons = folderName ? 'inline' : 'none';
      document.getElementById('scope-refresh').style.display = showButtons;
      document.getElementById('scope-reset').style.display = showButtons;
    }

    async function refreshFolder() {
      const btn = document.getElementById('scope-refresh');
      btn.disabled = true;
      btn.classList.add('spinning');
      const displayName = selectedFolderName || 'Documents';
      document.getElementById('status-text').textContent = `OneDrive: ${displayName} (refreshing…)`;
      try {
        const res = await fetch('/api/onedrive/focus', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ folderId: selectedFolderId, folderName: selectedFolderName }),
        });
        const { fileCount } = await res.json();
        const countStr = fileCount != null ? ` (${fileCount} files)` : '';
        document.getElementById('status-text').textContent = `OneDrive: ${displayName}${countStr}`;
      } catch {
        document.getElementById('status-text').textContent = `OneDrive: ${displayName} (refresh failed)`;
      }
      btn.classList.remove('spinning');
      btn.disabled = false;
    }

    async function resetToRoot() {
      selectedFolderId = null;
      selectedFolderName = null;
      document.querySelectorAll('.folder-name').forEach(el => el.classList.remove('selected'));
      const rootLabel = document.querySelector('.folder-name[data-id="root"]');
      if (rootLabel) rootLabel.classList.add('selected');
      updateScopeIndicator(null);
      document.getElementById('status-text').textContent = 'OneDrive: Documents (loading…)';
      const res = await fetch('/api/onedrive/focus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folderId: null, folderName: null }),
      });
      const { fileCount } = await res.json();
      const countStr = fileCount != null ? ` (${fileCount} files)` : '';
      document.getElementById('status-text').textContent = `OneDrive: Documents${countStr}`;
    }

    function createTreeNode(id, name, childCount) {
      const node = document.createElement('div');
      node.className = 'tree-node';

      const row = document.createElement('div');
      row.className = 'tree-row';

      const toggle = document.createElement('button');
      toggle.className = 'toggle-btn';

      const icon = document.createElement('span');
      icon.className = 'folder-icon';
      icon.textContent = '📁';

      const label = document.createElement('span');
      label.className = 'folder-name';
      label.textContent = name;
      label.dataset.id = id || 'root';
      if ((id || null) === selectedFolderId) label.classList.add('selected');

      const children = document.createElement('div');
      children.className = 'tree-children';

      if (childCount === 0) {
        toggle.style.visibility = 'hidden';
      } else {
        toggle.textContent = '▶';
        let loaded = false;
        toggle.addEventListener('click', async () => {
          const isExpanded = children.classList.toggle('expanded');
          toggle.textContent = isExpanded ? '▼' : '▶';
          if (isExpanded && !loaded) {
            loaded = true;
            children.innerHTML = '<div class="tree-loading">Loading...</div>';
            await loadChildren(id, children);
          }
        });
      }

      label.addEventListener('click', () => focusFolder(id, name, label));

      row.appendChild(toggle);
      row.appendChild(icon);
      row.appendChild(label);
      node.appendChild(row);
      node.appendChild(children);
      return node;
    }

    async function loadChildren(parentId, container) {
      try {
        const url = parentId ? `/api/onedrive/folders?itemId=${parentId}` : '/api/onedrive/folders';
        const res = await fetch(url);
        const folders = await res.json();
        container.innerHTML = '';
        if (!folders.length) {
          container.innerHTML = '<div class="tree-empty">No subfolders</div>';
          return;
        }
        folders.forEach(f => container.appendChild(createTreeNode(f.id, f.name, f.childCount)));
      } catch {
        container.innerHTML = '<div class="tree-empty">Error loading folders</div>';
      }
    }

    async function focusFolder(folderId, folderName, labelEl) {
      document.querySelectorAll('.folder-name').forEach(el => el.classList.remove('selected'));
      labelEl.classList.add('selected');
      selectedFolderId = folderId || null;
      selectedFolderName = folderId ? folderName : null;

      const displayName = folderId ? folderName : 'Documents';
      document.getElementById('status-text').textContent = `OneDrive: ${displayName} (loading…)`;

      const res = await fetch('/api/onedrive/focus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folderId: folderId || null, folderName: folderId ? folderName : null }),
      });
      const { fileCount, fileSummary } = await res.json();

      const countStr = fileCount != null ? ` (${fileCount} files)` : '';
      document.getElementById('status-text').textContent = `OneDrive: ${displayName}${countStr}`;
      updateScopeIndicator(folderId ? folderName : null);

      if (folderId) {
        try {
          const briefRes = await fetch('/api/chat/folder-brief', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              folderName: displayName,
              fileCount: fileCount ?? 0,
              fileSummary: fileSummary || '',
            }),
          });
          const briefData = await briefRes.json();
          if (briefData.message) {
            addMessage('assistant', briefData.message);
          }
        } catch { /* silently ignore */ }
      }
    }

    function initFolderTree(folderName, folderId) {
      selectedFolderId = folderId || null;
      const tree = document.getElementById('folder-tree');
      tree.innerHTML = '';
      const rootNode = createTreeNode(null, 'Documents', null);
      tree.appendChild(rootNode);
    }

    // ── OneDrive Status ──────────────────────────────────────────

    async function checkOnedriveStatus() {
      try {
        const res = await fetch('/api/onedrive/status');
        const { connected, folderId, folderName } = await res.json();
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const btn = document.getElementById('connect-btn');
        if (connected) {
          dot.classList.add('connected');
          text.textContent = `OneDrive: ${folderName || 'Documents'}`;
          btn.textContent = 'Reconnect';
          document.getElementById('folder-sidebar').classList.add('visible');
          initFolderTree(folderName, folderId);
          selectedFolderName = folderName || null;
          updateScopeIndicator(folderName);
        }
      } catch (e) { /* silently ignore */ }
    }

    // Show auth error if redirected back with error
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'auth_failed') {
      addMessage('assistant', 'OneDrive connection failed. Please try again.');
      window.history.replaceState({}, '', '/');
    }

    checkOnedriveStatus();

    // Load welcome message
    (async () => {
      try {
        const res = await fetch('/api/chat/welcome');
        const data = await res.json();
        if (data.message) addMessage('assistant', data.message);
      } catch { /* silently ignore */ }
    })();
  </script>
</body>
</html>
